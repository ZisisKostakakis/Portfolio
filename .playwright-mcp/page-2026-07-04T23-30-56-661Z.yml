          - generic [ref=f1e118]:
            - generic [ref=f1e119]:
              - heading "Three-Stack Architecture" [level=4] [ref=f1e120]
              - paragraph [ref=f1e121]: The system is split into three independent Docker Compose projects sharing a common bridge network (homelab_media_network). Each stack can be updated or restarted without affecting the others.
            - generic [ref=f1e122]:
              - heading "Network Topology" [level=4] [ref=f1e123]
              - paragraph [ref=f1e124]: Three distinct network zones enforce traffic isolation. All torrent services share the Gluetun VPN namespace and communicate via localhost. No traffic leaves without passing through WireGuard.
            - generic [ref=f1e125]:
              - heading "VPN Auto-Healing Flow" [level=4] [ref=f1e126]
              - paragraph [ref=f1e127]: When Gluetun restarts it creates a new network namespace, orphaning all dependent containers. gluetun-monitor detects this via SandboxKey comparison, waits up to 300s for Gluetun to become healthy, then stops and recreates all 9 VPN-dependent services with retry logic and rate limiting.
            - generic [ref=f1e128]:
              - heading "Media Request Pipeline" [level=4] [ref=f1e129]
              - paragraph [ref=f1e130]: End-to-end flow from a user request to media appearing in Plex, fully automated across seven services.
            - generic [ref=f1e131]:
              - heading "Container Auto-Update Pipeline" [level=4] [ref=f1e132]
              - paragraph [ref=f1e133]: What's Up Docker checks all image tags daily at 06:00. Updates trigger a webhook to a Python server which pulls the new image and recreates the container. Success and failure are reported via push notification.
